# Chỉ stack KAHA — không đụng service site khác. Bind loopback.
services:
  kaha-vn:
    build: .
    image: kaha-vn:local
    # Nạp DATABASE_URL / NEXT_PUBLIC_* từ máy Oracle (không vào image — .dockerignore .env*).
    env_file:
      - .env.local
    ports:
      - "127.0.0.1:3102:3102"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3102/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
