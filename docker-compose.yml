# Chỉ stack KAHA — không đụng service site khác.
# network_mode: host để DATABASE_URL dùng 127.0.0.1:5432 tới Postgres trên cùng máy (bridge 127.0.0.1 = container).
services:
  kaha-vn:
    build:
      context: .
      args:
        # Build cần NEXT_PUBLIC_* (dockerignore loại .env*). Dùng: docker compose --env-file .env.local up -d --build
        NEXT_PUBLIC_MEDIA_BASE: ${NEXT_PUBLIC_MEDIA_BASE:-}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
    image: kaha-vn:local
    network_mode: host
    env_file:
      - .env.local
    environment:
      HOSTNAME: "127.0.0.1"
      PORT: "3102"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3102/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
