# Chỉ stack KAHA — không đụng service site khác. Bind loopback.
services:
  kaha-vn:
    build: .
    image: kaha-vn:local
    environment:
      NEXT_PUBLIC_SITE_URL: https://kaha.vn
      KAHA_SITEMAP_MODE: minimal
    ports:
      - "127.0.0.1:3102:3102"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3102/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
